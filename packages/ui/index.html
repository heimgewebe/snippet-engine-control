<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snippet Studio (sec)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background: #f4f4f5;
    }
    aside {
      width: 300px;
      background: #fff;
      border-right: 1px solid #e4e4e7;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    aside header {
      padding: 16px;
      border-bottom: 1px solid #e4e4e7;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .search-bar {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 0.9em;
    }
    aside ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    aside li {
      padding: 12px 16px;
      border-bottom: 1px solid #f4f4f5;
      cursor: pointer;
    }
    aside li:hover {
      background: #f4f4f5;
    }
    aside li.selected {
      background: #e0e7ff;
      border-left: 3px solid #4f46e5;
    }
    .explorer-group-header {
      background: #e5e7eb;
      padding: 4px 16px;
      font-size: 0.85em;
      font-weight: bold;
      color: #4b5563;
      text-transform: uppercase;
      border-bottom: 1px solid #d1d5db;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .trigger {
      font-family: monospace;
      font-weight: bold;
      color: #111827;
      display: block;
    }
    .snippet-body-preview {
      font-size: 0.85em;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tab-bar {
      display: flex;
      background: #f4f4f5;
      border-bottom: 1px solid #e4e4e7;
      overflow-x: auto;
    }
    .tab {
      padding: 8px 16px;
      background: #e5e7eb;
      border-right: 1px solid #d1d5db;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9em;
      color: #374151;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab:hover {
      background: #d1d5db;
    }
    .tab.active {
      background: #fff;
      font-weight: 600;
      color: #111827;
      border-bottom: 1px solid #fff;
      margin-bottom: -1px;
    }
    .tab-close {
      cursor: pointer;
      font-weight: bold;
      color: #9ca3af;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
    }
    .tab-close:hover {
      color: #ef4444;
    }
    .toolbar {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e4e4e7;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 8px 16px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    button.primary {
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
    }
    button:hover {
      opacity: 0.9;
    }

    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .statusbar {
      padding: 6px 16px;
      background: #4f46e5;
      color: #fff;
      font-size: 0.8em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .editor-pane {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .side-pane {
      width: 400px;
      background: #fff;
      border-left: 1px solid #e4e4e7;
      display: flex;
      flex-direction: column;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    label {
      font-size: 0.9em;
      font-weight: 600;
      color: #374151;
    }
    input, textarea {
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-family: monospace;
    }
    textarea {
      min-height: 200px;
      resize: vertical;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid #e4e4e7;
    }
    .panel-section h3 {
      margin: 0 0 12px 0;
      font-size: 1em;
      color: #111827;
    }
    .preview-box {
      padding: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      min-height: 50px;
    }
    .diagnostics ul {
      padding-left: 20px;
      margin: 0;
      color: #b91c1c;
      font-size: 0.9em;
    }
    .diagnostics.clean {
      color: #047857;
    }

    /* Modal for Export Plan */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background: #fff;
      width: 80%;
      max-width: 800px;
      max-height: 80vh;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 16px;
      border-bottom: 1px solid #e4e4e7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-body {
      padding: 16px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      background: #1f2937;
      color: #f3f4f6;
    }
    .modal-footer {
      padding: 16px;
      border-top: 1px solid #e4e4e7;
      text-align: right;
    }
  </style>
</head>
<body>

  <aside>
    <header>
      <div class="header-top">
        <span>Snippets</span>
        <button id="btn-new" title="New Snippet" aria-label="New Snippet">+</button>
      </div>
      <input
        type="text"
        id="input-search"
        class="search-bar"
        placeholder="Search snippets..."
        aria-label="Search snippets"
      />
    </header>
    <ul id="snippet-list">
      <!-- Populated by JS -->
    </ul>
  </aside>

  <main>
    <div class="tab-bar" id="tab-bar" role="tablist">
      <!-- Populated by JS -->
    </div>
    <div class="toolbar">
      <button id="btn-save" class="primary">Save</button>
      <button id="btn-delete">Delete</button>
      <div style="flex: 1"></div>
      <button id="btn-dryrun">Dry-run Export (Espanso)</button>
    </div>

    <div class="panels">
      <div class="editor-pane">
        <div class="form-group">
          <label>ID</label>
          <input type="text" id="input-id" readonly disabled style="background: #f3f4f6;">
        </div>
        <div class="form-group">
          <label>Triggers (comma separated)</label>
          <input type="text" id="input-triggers" placeholder=":hello, :hi">
        </div>
        <div class="form-group">
          <label>Body</label>
          <textarea id="input-body" placeholder="Replacement text..."></textarea>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="input-word"> Word Boundary
          </label>
        </div>
      </div>

      <div class="side-pane">
        <div class="panel-section">
          <h3>Diagnostics</h3>
          <div id="diagnostics-box" class="diagnostics clean">All good.</div>
        </div>
        <div class="panel-section">
          <h3>Live Preview</h3>
          <div id="preview-box" class="preview-box"></div>
        </div>
      </div>
    </div>

    <div class="statusbar" id="statusbar">
      <span id="status-left">Ready</span>
      <span id="status-right">0 snippets</span>
    </div>
  </main>

  <!-- Export Plan Modal -->
  <div id="modal-export" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 style="margin: 0;">Dry-run Export Plan</h3>
        <button id="btn-close-modal">X</button>
      </div>
      <div class="modal-body" id="export-plan-content">
        Loading...
      </div>
      <div class="modal-footer">
        <button id="btn-close-modal-footer">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
